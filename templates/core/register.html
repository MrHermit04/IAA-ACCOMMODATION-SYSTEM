{% extends 'base.html' %}
{% block content %}
<div style="max-width:400px; margin:50px auto;">
    <h2>Register</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p}}
        <button type="submit" class="btn-primary">Register</button>
    </form>
    <p class="mt-3"><a href="{% url 'login'}">Already have an account? Login</a></p>
</div>
{% endblock %}
